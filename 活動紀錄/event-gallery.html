<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動紀錄</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    padding: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 6px;
  }

  .grid img {
    width: 100%;
    aspect-ratio: 3/2;
    object-fit: cover;
    display: block;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .grid img:hover { opacity: 0.85; }

  /* Lightbox */
  #lb {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  #lb.open { display: flex; }

  #lb img {
    max-width: 95vw;
    max-height: 95vh;
    object-fit: contain;
  }

  #lb-close {
    position: fixed;
    top: 16px; right: 20px;
    color: #aaa;
    font-size: 32px;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
  }

  #lb-prev, #lb-next {
    position: fixed;
    top: 50%; transform: translateY(-50%);
    color: #aaa;
    font-size: 40px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 20px;
    line-height: 1;
    user-select: none;
  }

  #lb-prev { left: 0; }
  #lb-next { right: 0; }
</style>
</head>
<body>

<div class="grid" id="grid">
  <!-- 把下面每個 src 換成你的圖片檔名，例如 src="01.jpg" -->
  <img src="01.jpg" onclick="open_lb(0)">
  <img src="02.jpg" onclick="open_lb(1)">
  <img src="03.jpg" onclick="open_lb(2)">
  <img src="04.jpg" onclick="open_lb(3)">
  <img src="05.jpg" onclick="open_lb(4)">
  <img src="06.jpg" onclick="open_lb(5)">
  <img src="07.jpg" onclick="open_lb(6)">
  <img src="08.jpg" onclick="open_lb(7)">
  <img src="09.jpg" onclick="open_lb(8)">
  <img src="10.jpg" onclick="open_lb(9)">
  <img src="11.jpg" onclick="open_lb(10)">
  <img src="12.jpg" onclick="open_lb(11)">
  <img src="13.jpg" onclick="open_lb(12)">
  <img src="14.jpg" onclick="open_lb(13)">
  <img src="15.jpg" onclick="open_lb(14)">
  <img src="16.jpg" onclick="open_lb(15)">
  <img src="17.jpg" onclick="open_lb(16)">
  <img src="18.jpg" onclick="open_lb(17)">
  <img src="19.jpg" onclick="open_lb(18)">
  <img src="20.jpg" onclick="open_lb(19)">
  <img src="21.jpg" onclick="open_lb(20)">
  <img src="22.jpg" onclick="open_lb(21)">
  <img src="23.jpg" onclick="open_lb(22)">
  <img src="24.jpg" onclick="open_lb(23)">
  <img src="25.jpg" onclick="open_lb(24)">
</div>

<div id="lb">
  <button id="lb-close" onclick="close_lb()">✕</button>
  <button id="lb-prev" onclick="nav(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-next" onclick="nav(1)">›</button>
</div>

<script>
  const imgs = Array.from(document.querySelectorAll('.grid img'));
  let cur = 0;

  function open_lb(i) {
    cur = i;
    document.getElementById('lb-img').src = imgs[i].src;
    document.getElementById('lb').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close_lb() {
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
  }

  function nav(d) {
    cur = (cur + d + imgs.length) % imgs.length;
    document.getElementById('lb-img').src = imgs[cur].src;
  }

  document.getElementById('lb').addEventListener('click', e => {
    if (e.target === document.getElementById('lb')) close_lb();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb').classList.contains('open')) return;
    if (e.key === 'Escape') close_lb();
    if (e.key === 'ArrowLeft') nav(-1);
    if (e.key === 'ArrowRight') nav(1);
  });
</script>

</body>
</html>
